name: Build & Push Docker Image

on:
  push:
    branches: [main]

concurrency:
  group: docker-publish
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        run: |
          # Find highest existing v<number> tag
          LATEST=$(git tag -l 'v[0-9]*' | grep -E '^v[0-9]+$' | sed 's/v//' | sort -n | tail -1)
          if [ -z "$LATEST" ]; then
            NEXT=1
          else
            NEXT=$((LATEST + 1))
          fi
          echo "version=v${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Next version: v${NEXT}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.repo.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}
